<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9f0"/>
      <stop offset="100%" stop-color="#fef3e2"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)" stroke="#fed7aa" stroke-width="6"/>

  <g stroke="#a8a29e" stroke-width="32" stroke-linecap="round">
    <line x1="240" y1="380" x2="380" y2="380"/>
    <line x1="240" y1="500" x2="380" y2="500"/>
    <line x1="240" y1="620" x2="380" y2="620"/>
  </g>

  <circle cx="760" cy="280" r="56" fill="#84cc16"/>

  <path d="M 400 600 L 540 740 L 800 460"
        fill="none"
        stroke="#fb923c"
        stroke-width="80"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#soft-shadow)"/>
</svg>
